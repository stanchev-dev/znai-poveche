{% extends "base.html" %}
{% load static %}

{% block title %}Публикации{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Публикации</h1>
<div class="row g-2 mb-3">
  <div class="col-md-3">
    <select id="sort-select" class="form-select">
      <option value="new">Най-нови</option>
      <option value="top">Най-висок рейтинг</option>
    </select>
  </div>
  <div class="col-md-6">
    <input id="search-input" class="form-control" placeholder="Търсене" />
  </div>
  <div class="col-md-3 d-grid">
    <button class="btn btn-outline-primary" id="search-btn">Търси</button>
  </div>
</div>
<div id="posts-alert"></div>
<div id="posts-list" class="vstack gap-3"></div>
<div class="d-flex justify-content-between mt-3">
  <button class="btn btn-outline-secondary" id="prev-btn">Предишна</button>
  <button class="btn btn-outline-secondary" id="next-btn">Следваща</button>
</div>
<div id="subjects-page-meta" data-subject-slug="{{ subject_slug }}"></div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/pages/subjects.js' %}"></script>
{% endblock %}
