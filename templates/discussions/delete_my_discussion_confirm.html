{% extends "base.html" %}

{% block title %}Изтриване на дискусия{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Изтриване на дискусия</h1>
        <p class="mb-4">Сигурен ли си, че искаш да изтриеш „{{ post.title }}“?</p>
        <form method="post" class="d-flex justify-content-end gap-2">
          {% csrf_token %}
          <a class="btn btn-outline-secondary rounded-pill" href="{% url 'my-discussions-page' %}">Отказ</a>
          <button type="submit" class="btn btn-outline-danger rounded-pill">Изтрий</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
