{% extends "base.html" %}
{% load static %}

{% block title %}Изтриване на дискусия{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div id="delete-error-box"></div>
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Изтриване на дискусия</h1>
        <p class="mb-4">Сигурен ли си, че искаш да изтриеш „{{ post.title }}“?</p>
        <form method="post" class="d-flex justify-content-end gap-2" id="delete-confirm-form" data-redirect-url="{% url 'my-discussions-page' %}">
          {% csrf_token %}
          <a class="btn btn-outline-secondary rounded-pill" href="{% url 'my-discussions-page' %}">Отказ</a>
          <button type="submit" class="btn btn-outline-danger rounded-pill" id="delete-confirm-submit">Изтрий</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/pages/delete_confirm.js' %}"></script>
{% endblock %}
