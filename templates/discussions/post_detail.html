{% extends "base.html" %}
{% load static %}

{% block title %}Детайли за публикация{% endblock %}

{% block extra_css %}
<link href="{% static 'css/discussions.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="row g-4 align-items-start discussion-detail-page">
  <div class="col-12">
    <div id="post-alert"></div>
    <div id="post-container"></div>


    <section class="mt-4">
      <h2 class="h5">Коментари</h2>
      <div id="comments-list" class="vstack gap-2 mb-3"></div>
    </section>

    {% if user.is_authenticated %}
    <section id="comment-form-wrap" class="card p-3 mb-4">
      <h3 class="h6">Добави коментар</h3>
      <form id="comment-form">
        <textarea id="comment-body" name="body" class="form-control mb-2" rows="3" required></textarea>
        <button class="btn btn-brand-purple" type="submit">Публикувай</button>
      </form>
    </section>
    {% endif %}
  </div>
</div>

<div id="post-page-meta" data-post-id="{{ post_id }}"></div>

<div id="discussion-image-lightbox" class="listing-image-lightbox" aria-hidden="true">
  <button type="button" class="listing-image-lightbox-close" id="discussion-lightbox-close" aria-label="Затвори разширената снимка">
    <i class="bi bi-x-lg" aria-hidden="true"></i>
  </button>
  <button type="button" class="listing-image-lightbox-nav listing-image-lightbox-prev d-none" id="discussion-lightbox-prev" aria-label="Предишна снимка">
    &#10094;
  </button>
  <div class="listing-image-lightbox-dialog" id="discussion-lightbox-dialog">
    <img id="discussion-lightbox-image" class="listing-image-lightbox-image" alt="Разширена снимка към дискусия">
  </div>
  <button type="button" class="listing-image-lightbox-nav listing-image-lightbox-next d-none" id="discussion-lightbox-next" aria-label="Следваща снимка">
    &#10095;
  </button>
</div>

{% endblock %}

{% block extra_js %}
<script src="{% static 'js/subject_badges.js' %}"></script>
<script src="{% static 'js/pages/marketplace_image_viewer.js' %}"></script>
<script src="{% static 'js/pages/post_detail.js' %}"></script>
{% endblock %}
