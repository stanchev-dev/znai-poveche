{% extends "base.html" %}
{% load static %}

{% block title %}Детайли за публикация{% endblock %}

{% block extra_css %}
<link href="{% static 'css/discussions.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="row g-4 align-items-start">
  <div class="col-12">
    <div id="post-alert"></div>
    <div id="post-container"></div>

    <template id="discussion-gallery-template">
      <div class="card marketplace-detail-gallery-card">
        <div class="card-body p-2 p-md-3">
          <div class="marketplace-carousel" data-count="__COUNT__">
            <button type="button" class="carousel-nav carousel-prev" aria-label="Предишна снимка">&#10094;</button>
            <div class="marketplace-detail-image-frame rounded">
              <img class="img-fluid marketplace-detail-image carousel-main-image" alt="Илюстрация към дискусия">
              <button type="button" class="listing-expand-btn" aria-label="Разшири снимката">
                <i class="bi bi-arrows-fullscreen" aria-hidden="true"></i>
              </button>
            </div>
            <button type="button" class="carousel-nav carousel-next" aria-label="Следваща снимка">&#10095;</button>
          </div>
          <div class="carousel-thumbs"></div>
        </div>
      </div>
    </template>

    <section class="mt-4">
      <h2 class="h5">Коментари</h2>
      <div id="comments-list" class="vstack gap-2 mb-3"></div>
    </section>

    {% if user.is_authenticated %}
    <section id="comment-form-wrap" class="card p-3 mb-4">
      <h3 class="h6">Добави коментар</h3>
      <form id="comment-form">
        <textarea id="comment-body" class="form-control mb-2" rows="3" required></textarea>
        <button class="btn btn-brand-purple" type="submit">Публикувай</button>
      </form>
    </section>
    {% endif %}
  </div>
</div>

<div id="post-page-meta" data-post-id="{{ post_id }}"></div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/subject_badges.js' %}"></script>
<script src="{% static 'js/pages/marketplace_image_viewer.js' %}"></script>
<script src="{% static 'js/pages/post_detail.js' %}"></script>
{% endblock %}
