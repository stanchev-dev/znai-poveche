<section class="card shadow-sm border-0 rounded-4 p-4 publish-section-card">
  <h2 class="h5 mb-3">Снимки</h2>
  <div class="row g-3 align-items-start">
    <div class="col-lg-8">
      <input id="images" name="images" type="file" class="d-none" accept=".jpg,.jpeg,.png,image/jpeg,image/png" multiple>
      <input id="deleted_image_ids" name="deleted_image_ids" type="hidden" value="">
      <input id="ordering_image_ids" name="ordering_image_ids" type="hidden" value="">
      <script id="existing-images-data" type="application/json">{{ existing_images_json|default:'[]'|safe }}</script>
      <div id="listing-images-grid" class="listing-images-grid" aria-live="polite"></div>
      <div id="image-inline-error" class="text-danger small mt-2 {% if not form.non_field_errors %}d-none{% endif %}" aria-live="polite">{% if form.non_field_errors %}{{ form.non_field_errors|join:', ' }}{% endif %}</div>
    </div>
    <div class="col-lg-4">
      <div class="publish-image-tip">
        <strong class="d-block mb-2">Съвет</strong>
        Качи ясни снимки (лице или материали) — така учениците ти вярват повече.
        <div class="mt-2">До 4 снимки • до 2MB • .jpg/.jpeg/.png</div>
      </div>
    </div>
  </div>
</section>
