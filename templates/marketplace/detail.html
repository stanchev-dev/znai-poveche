{% extends "base.html" %}
{% load static %}

{% block title %}Детайли обява{% endblock %}

{% block content %}
<div class="marketplace-detail-page">
  <div id="listing-alert"></div>

  <div id="listing-detail" class="row g-4 align-items-start">
    <div class="col-12 col-lg-8">
      <div id="listing-gallery"></div>
    </div>

    <div class="col-12 col-lg-4">
      <div class="marketplace-detail-sidebar sticky-lg-top">
        <div class="card marketplace-detail-sidebar-card">
          <div class="card-body">
            <h1 id="listing-title" class="h3 mb-3">—</h1>
            <p id="listing-description" class="mb-4 text-break">—</p>
            <div class="marketplace-detail-price-label">Цена на час</div>
            <div id="listing-price" class="marketplace-detail-price">—</div>
            <a id="call-btn" class="btn btn-dark w-100 contacts-cta-btn call-cta rounded-3 py-3" href="#" role="button" aria-label="Обади се">Обади се</a>
          </div>
        </div>
        <div id="listing-owner" class="mt-3"></div>
      </div>
    </div>
  </div>

  <div id="listing-meta" data-listing-id="{{ listing_id }}"></div>

  <div id="listing-image-lightbox" class="listing-image-lightbox" aria-hidden="true">
    <button type="button" class="listing-image-lightbox-close" id="listing-lightbox-close" aria-label="Затвори разширената снимка">
      <i class="bi bi-x-lg" aria-hidden="true"></i>
    </button>
    <button type="button" class="listing-image-lightbox-nav listing-image-lightbox-prev d-none" id="listing-lightbox-prev" aria-label="Предишна снимка">
      &#10094;
    </button>
    <div class="listing-image-lightbox-dialog" id="listing-lightbox-dialog">
      <img id="listing-lightbox-image" class="listing-image-lightbox-image" alt="Разширена снимка на обява">
    </div>
    <button type="button" class="listing-image-lightbox-nav listing-image-lightbox-next d-none" id="listing-lightbox-next" aria-label="Следваща снимка">
      &#10095;
    </button>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/subject_badges.js' %}"></script>
<script src="{% static 'js/pages/marketplace_detail.js' %}"></script>
{% endblock %}
