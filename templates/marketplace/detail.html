{% extends "base.html" %}
{% load static %}

{% block title %}Детайли обява{% endblock %}

{% block content %}
<div class="marketplace-detail-page">
  <div id="listing-alert"></div>

  <div id="listing-detail" class="row g-4 align-items-start">
    <div class="col-12 col-lg-8">
      <div id="listing-gallery"></div>
    </div>

    <div class="col-12 col-lg-4">
      <div class="marketplace-detail-sidebar sticky-lg-top">
        <div class="card marketplace-detail-sidebar-card">
          <div class="card-body">
            <h1 id="listing-title" class="h3 mb-3">—</h1>
            <p id="listing-description" class="mb-4 text-break">—</p>
            <div class="marketplace-detail-price-label">Цена на час</div>
            <div id="listing-price" class="marketplace-detail-price">—</div>
            <a id="call-btn" class="btn btn-dark w-100 contacts-cta-btn call-cta rounded-3 py-3" href="#" role="button" aria-label="Обади се">Обади се</a>
          </div>
        </div>
        <div id="listing-owner" class="mt-3"></div>
      </div>
    </div>
  </div>

  <div id="listing-meta" data-listing-id="{{ listing_id }}"></div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/subject_badges.js' %}"></script>
<script src="{% static 'js/pages/marketplace_detail.js' %}"></script>
{% endblock %}
