{% extends "base.html" %}
{% load static %}

{% block title %}Маркетплейс{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
  <h1 class="h3 mb-0">Маркетплейс</h1>
  {% if user.is_authenticated %}
  <a class="btn btn-primary" href="{% url 'marketplace-publish-page' %}">+ Публикувай обява</a>
  {% else %}
  <a class="btn btn-outline-primary" href="{% url 'login' %}?next={% url 'marketplace-publish-page' %}">Влез, за да публикуваш</a>
  {% endif %}
</div>
<div class="card p-3 mb-3">
  <div class="row g-2">
    <div class="col-md-3"><select id="subject-filter" class="form-select"><option value="all">Всички предмети</option></select></div>
    <div class="col-md-2"><div class="form-check mt-2"><input class="form-check-input" type="checkbox" id="online-only"><label class="form-check-label" for="online-only">Само онлайн</label></div></div>
    <div class="col-md-2"><input id="price-min" class="form-control" placeholder="Мин. цена"></div>
    <div class="col-md-2"><input id="price-max" class="form-control" placeholder="Макс. цена"></div>
    <div class="col-md-3 d-grid"><button id="apply-filters" class="btn btn-outline-primary">Приложи</button></div>
  </div>
</div>
<div id="listings-alert"></div>
<div id="listings-list" class="vstack gap-3"></div>
<div class="d-flex justify-content-between mt-3">
  <button class="btn btn-outline-secondary" id="prev-btn">Предишна</button>
  <button class="btn btn-outline-secondary" id="next-btn">Следваща</button>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/subject_badges.js' %}"></script>
<script src="{% static 'js/pages/marketplace_list.js' %}"></script>
{% endblock %}
