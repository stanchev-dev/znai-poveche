{% extends "base.html" %}

{% block title %}Публикувай обява{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <h1 class="h3 mb-3">Публикувай обява</h1>
    <div id="publish-errors"></div>

    <form id="listing-publish-form" class="card card-body" enctype="multipart/form-data">
      <div class="mb-3">
        <label for="subject" class="form-label">Предмет</label>
        <select id="subject" name="subject" class="form-select" required>
          <option value="">Зареждане...</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="price_per_hour" class="form-label">Цена на час</label>
        <input id="price_per_hour" name="price_per_hour" type="number" step="0.01" min="0" class="form-control" required>
      </div>

      <fieldset class="mb-3">
        <legend class="col-form-label pt-0">Режим на обучение</legend>
        <div class="form-check">
          <input id="lesson_mode_online" name="lesson_mode" type="radio" class="form-check-input" value="online" required>
          <label for="lesson_mode_online" class="form-check-label">Онлайн</label>
        </div>
        <div class="form-check">
          <input id="lesson_mode_in_person" name="lesson_mode" type="radio" class="form-check-input" value="in_person" required>
          <label for="lesson_mode_in_person" class="form-check-label">Присъствено</label>
        </div>
        <div class="form-check">
          <input id="lesson_mode_online_and_in_person" name="lesson_mode" type="radio" class="form-check-input" value="online_and_in_person" checked required>
          <label for="lesson_mode_online_and_in_person" class="form-check-label">Онлайн + присъствено</label>
        </div>
      </fieldset>

      <div class="mb-3">
        <label for="image" class="form-label">Снимка (по желание)</label>
        <input id="image" name="image" type="file" class="form-control" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp">
      </div>

      <div class="mb-3">
        <label for="description" class="form-label">Описание</label>
        <textarea id="description" name="description" class="form-control" rows="5" required></textarea>
      </div>

      <div class="mb-3">
        <label for="contact_phone" class="form-label">Телефон</label>
        <input id="contact_phone" name="contact_phone" type="text" class="form-control">
      </div>

      <button type="submit" class="btn btn-primary">Публикувай</button>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function () {
  const form = document.getElementById('listing-publish-form');
  const errorsBox = document.getElementById('publish-errors');
  const subjectSelect = document.getElementById('subject');

  function renderErrors(errorData) {
    const items = [];
    if (typeof errorData === 'string') {
      items.push(errorData);
    } else if (Array.isArray(errorData)) {
      errorData.forEach((entry) => items.push(String(entry)));
    } else if (errorData && typeof errorData === 'object') {
      Object.entries(errorData).forEach(([field, messages]) => {
        if (Array.isArray(messages)) {
          messages.forEach((msg) => items.push(`${field}: ${msg}`));
        } else {
          items.push(`${field}: ${messages}`);
        }
      });
    }

    if (!items.length) {
      items.push('Възникна грешка при публикуване.');
    }

    errorsBox.innerHTML = `
      <div class="alert alert-danger">
        <ul class="mb-0">${items.map((item) => `<li>${item}</li>`).join('')}</ul>
      </div>
    `;
  }

  async function loadSubjects() {
    const response = await window.apiUtils.apiFetch('/api/subjects/');
    if (!response.ok) {
      subjectSelect.innerHTML = '<option value="">Неуспешно зареждане</option>';
      return;
    }

    const subjects = await response.json();
    subjectSelect.innerHTML = '<option value="">Избери предмет</option>' + subjects
      .map((subject) => `<option value="${subject.slug}">${subject.name}</option>`)
      .join('');
  }

  form.addEventListener('submit', async function (event) {
    event.preventDefault();
    errorsBox.innerHTML = '';

    const payload = new FormData();
    payload.append('subject', form.subject.value);
    payload.append('price_per_hour', form.price_per_hour.value);
    payload.append('lesson_mode', form.lesson_mode.value);
    payload.append('description', form.description.value);
    payload.append('contact_phone', form.contact_phone.value);
    if (form.image.files.length > 0) {
      payload.append('image', form.image.files[0]);
    }

    const response = await window.apiUtils.apiFetch('/api/listings/', {
      method: 'POST',
      body: payload,
    });

    if (response.ok) {
      window.location.assign('/marketplace/');
      return;
    }

    if (response.status === 400) {
      const data = await response.json();
      renderErrors(data);
      return;
    }

    renderErrors('Сървърна грешка. Опитай отново.');
  });

  loadSubjects();
})();
</script>
{% endblock %}
